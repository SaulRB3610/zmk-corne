# Display Configuration
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_WPM_STATUS=y

# Split Keyboard
#CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# OLED Displays
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_I2C=y

# Performance
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Desactivar todas las animaciones periféricas
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=n
CONFIG_NICE_OLED_WIDGET_STATIC_IMAGE_PERIPHERAL=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_GEM=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_HEAD=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_POKEMON=n

# Asegurar que el lado izquierdo (central) no use animaciones problemáticas
CONFIG_NICE_OLED_WIDGET_ANIMATION_CENTRAL=n
CONFIG_NICE_OLED_WIDGET_STATIC_IMAGE_CENTRAL=y

# Si usas un lado central (izquierdo) con pantalla, también desactiva animaciones allí
CONFIG_NICE_OLED_WIDGET_STATUS=n
CONFIG_NICE_OLED_WIDGET_WPM=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=n
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=n